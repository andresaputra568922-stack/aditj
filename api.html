<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TikTok Downloader API</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #fe2c55; color: white; border: none; border-radius: 5px; cursor: pointer; }
        pre { text-align: left; background: #000; padding: 15px; border-radius: 5px; color: #00ff00; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>TikTok Downloader API</h2>
        <div class="card">
            <input type="text" id="inputUrl" placeholder="Tempel link TikTok...">
            <button onclick="fetchData()">Cek Link</button>
            <p style="font-size: 12px; color: #888;">Gunakan <code>?url=LINK_TIKTOK</code> untuk mode API</p>
        </div>
        <div id="output" style="margin-top: 20px; display: none;">
            <h3>Result (JSON):</h3>
            <pre id="jsonDisplay"></pre>
        </div>
    </div>

    <script>
        // Fungsi utama scraper
        async function getTikTokData(targetUrl) {
            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(targetUrl)}`);
                const res = await response.json();
                
                if (res.code === 0) {
                    return {
                        status: true,
                        title: res.data.title,
                        video: "https://www.tikwm.com" + res.data.play, // Link MP4
                        audio: "https://www.tikwm.com" + res.data.music, // Link MP3
                        thumbnail: "https://www.tikwm.com" + res.data.cover
                    };
                } else {
                    return { status: false, message: "Video tidak ditemukan atau private" };
                }
            } catch (e) {
                return { status: false, message: "Server API error" };
            }
        }

        // Logika untuk Bot WA (Auto-detect URL Parameter)
        const params = new URLSearchParams(window.location.search);
        const urlParam = params.get('url');

        if (urlParam) {
            // Jika bot memanggil link: namarepo.github.io?url=https://tiktok.com/...
            document.getElementById('ui').innerHTML = 'Processing API Request...';
            getTikTokData(urlParam).then(data => {
                // Tampilkan JSON murni di layar agar bot bisa scraping teksnya
                document.body.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            });
        }

        // Logika untuk penggunaan manual di Web
        async function fetchData() {
            const val = document.getElementById('inputUrl').value;
            if (!val) return alert('Isi URL!');
            
            const result = await getTikTokData(val);
            document.getElementById('output').style.display = 'block';
            document.getElementById('jsonDisplay').innerText = JSON.stringify(result, null, 2);
        }
    </script>
</body>
</html>
