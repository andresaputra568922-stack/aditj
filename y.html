<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditiya News | Portal Berita Terkini 🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header MENYALA */
        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(15px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(37, 99, 235, 0.5);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Bento Grid Style */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .news-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .news-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }

        .news-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
        }

        .news-content {
            padding: 20px;
            flex-grow: 1;
        }

        .news-meta {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .news-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .read-more {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Loading Spinner */
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        footer {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Animasi masuk */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease forwards;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Aditiya<span>News.</span></div>
    </header>

    <div class="container">
        <div id="loader"><div class="spinner"></div></div>
        <div class="news-grid" id="newsContainer"></div>
    </div>

    <footer>
        <p>&copy; 2026 Aditiya RSS Reader. Developed with 🔥</p>
    </footer>

    <script>
        // RSS Feed URL (Contoh: Berita Terkini dari RSS2JSON agar lancar di Web)
        // Abang bisa ganti URL ini dengan RSS feed berita lainnya
        const RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https://www.antaranews.com/rss/terkini.xml';

        async function fetchNews() {
            try {
                const response = await fetch(RSS_URL);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    displayNews(data.items);
                } else {
                    document.getElementById('newsContainer').innerHTML = '<p>Gagal mengambil berita, coba lagi nanti bang.</p>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('newsContainer').innerHTML = '<p>Server error, cek koneksi Abang.</p>';
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function displayNews(articles) {
            const container = document.getElementById('newsContainer');
            
            articles.forEach((item, index) => {
                // Mencari gambar di deskripsi jika thumbnail kosong
                let thumbnail = item.thumbnail || item.enclosure.link || 'https://via.placeholder.com/400x200?text=Aditiya+News';
                
                const card = document.createElement('div');
                card.className = 'news-card fade-in';
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <img src="${thumbnail}" class="news-img" alt="Berita">
                    <div class="news-content">
                        <div class="news-meta">${item.pubDate.split(' ')[0]}</div>
                        <h2 class="news-title">${item.title}</h2>
                        <p class="news-desc">${item.description.replace(/<[^>]*>?/gm, '').substring(0, 150)}...</p>
                        <div class="news-footer">
                            <a href="${item.link}" target="_blank" class="read-more">Baca Selengkapnya &rarr;</a>
                        </div>
                    </div>
                `;
                
                card.onclick = () => window.open(item.link, '_blank');
                container.appendChild(card);
            });
        }

        // Jalankan pas web dibuka
        fetchNews();
    </script>
</body>
</html>
